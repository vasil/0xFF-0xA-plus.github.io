<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <title>0xFF + 0xA</title>
        <style>
            #flash {
                position: fixed;
                inset: 0;
                background: white;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.4s ease;
                z-index: 1;
            }
        </style>
    </head>
    <body>
        <div id="flash"></div>

        <div id="main">
            <h1 title="Because the Reverse Polish Notation ROCKS!">
                <span id="number">0xFF + 0xA</span>
            </h1>
            <p id="address">М.П.</p>
        </div>

        <script>
            const original = [...'0xFF + 0xA'];
            const word     = [...'DZHAGOR!!!'];
            const colors   = ['#e63946', '#f4a261', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6', '#e91e63'];
            const number   = document.getElementById('number');
            const flash    = document.getElementById('flash');

            let chars         = [...original];
            let activated     = new Set();
            let colorInterval = null;
            let cursorPos     = -1;
            let cursorOn      = true;
            let cursorBlink   = null;

            const CURSOR_COLOR = '#39ff14';

            function startCursorBlink() {
                cursorBlink = setInterval(() => {
                    cursorOn = !cursorOn;
                    renderChars();
                }, 500);
            }

            function stopCursorBlink() {
                clearInterval(cursorBlink);
                cursorBlink = null;
                cursorOn = true;
            }

            function shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function renderChars() {
                number.innerHTML = chars.map((ch, i) => {
                    const hasCursor = cursorOn && i === cursorPos;
                    if (ch === null) {
                        return hasCursor
                            ? `<span style="display:inline-block;vertical-align:baseline;color:transparent;font-size:1em;background:${CURSOR_COLOR}">&nbsp;</span>`
                            : `<span style="color:transparent;font-size:1em">&nbsp;</span>`;
                    }
                    const color = activated.has(i) ? colors[Math.floor(Math.random() * colors.length)] : '#000000';
                    const display = ch === ' ' ? '&nbsp;' : ch;
                    return hasCursor
                        ? `<span style="display:inline-block;vertical-align:baseline;color:#000;background:${CURSOR_COLOR};font-size:1em">${display}</span>`
                        : `<span style="color:${color};font-size:1em">${display}</span>`;
                }).join('');
            }

            function startColorPhase() {
                const indices = shuffle(original.map((ch, i) => i).filter(i => original[i] !== ' '));
                let a = 0;
                const activateInterval = setInterval(() => {
                    if (a < indices.length) {
                        activated.add(indices[a++]);
                    } else {
                        clearInterval(activateInterval);
                    }
                }, 500);
                renderChars();
                colorInterval = setInterval(renderChars, 700);
            }

            function flashBackground(onComplete) {
                flash.style.opacity = '1';
                setTimeout(() => {
                    flash.style.opacity = '0';
                    setTimeout(onComplete, 400);
                }, 400);
            }

            function startReveal() {
                clearInterval(colorInterval);
                activated.clear();

                // Amber block cursor appears at position 0 and blinks
                cursorPos = 0;
                cursorOn = true;
                startCursorBlink();
                renderChars();

                // After pause, cursor advances and changes each letter underneath it
                setTimeout(() => {
                    let i = 0;
                    const revealInterval = setInterval(() => {
                        if (i < word.length) {
                            chars[i] = word[i];
                            cursorOn = true;
                            i++;
                            cursorPos = i < chars.length ? i : -1;
                            renderChars();
                        } else {
                            clearInterval(revealInterval);
                            stopCursorBlink();
                            cursorPos = -1;
                            renderChars();
                            document.getElementById('address').textContent = '615b';
                        }
                    }, 600);
                }, 1200);
            }

            // 0s  — static hex text
            // 2s  — chars begin blinking with colors
            // 7s  — white flash, then amber cursor rewrites text
            setTimeout(startColorPhase, 2000);
            setTimeout(() => flashBackground(startReveal), 7000);
        </script>
    </body>
</html>
